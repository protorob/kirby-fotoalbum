title: Gallery

tabs:
  content:
    label: Gallery
    icon: image
    columns:
      main:
        width: 2/3
        sections:
          gallery_images:
            type: fields
            fields:
              galleryImages:
                label: Gallery images
                type: files
                template: image
                layout: cards
                image:
                  cover: true
                  ratio: 6/4
                multiple: true
                uploads: true
      sidebar:
        width: 1/3
        sections:
          gallery_fields:
            type: fields
            fields:
              coverImage:
                label: Cover image
                type: files
                maxFiles: 1
              description:
                type: textarea
                label: Description
                size: medium
              date:
                type: date
                label: Date
                default: today

  security:
    label: Security
    icon: lock
    sections:
      security_fields:
        type: fields
        fields:
          security:
            extends: fields/locked-pages
          selectionOpen:
            type: toggle
            label: Image selection
            text: Allow clients to select and submit images
            default: false

  files:
    label: Files
    icon: upload
    sections:
      all_files:
        type: files
        label: All uploaded files
        layout: cards
        batch: true

  seo:
    extends: seo

  submissions:
    label: Submissions
    icon: email
    sections:
      submissions_fields:
        type: fields
        fields:
          selections:
            type: structure
            label: Received selections
            fields:
              date:
                type: text
                label: Date
                width: 1/4
              sender:
                type: text
                label: Name
                width: 1/4
              senderEmail:
                type: email
                label: Email
                width: 1/2
              message:
                type: textarea
                label: Message
              images:
                type: textarea
                label: Selected images
